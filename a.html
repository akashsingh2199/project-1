<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to do list </title>
</head>
<body style="margin: 0; height: 100vh; color: antiquewhite; background-color: rgb(0, 0, 0); display: flex; justify-content: center; align-items: center;">
    <DIV style="height: 400px; width: 400px;background-color: #01c8ef; border-radius: 50px;display: flex; flex-direction: column; align-items: center; justify-content: flex-start;"><h1>TO DO LIST</h1>
    <div >
    <button style="background-color: rgb(97, 253, 0); border-radius: 20px;" id="btn" >add task</button>
    <input type="text" id="input" placeholder="enter task">
    </div>
    <ul style="color: rgb(0, 0, 0);" id="do" >
    </ul>
    </DIV>
</body>
<script>
    const button = document.querySelector('#btn')
    const input = document.querySelector('#input')
    const list = document.querySelector('#do')
    button.addEventListener('click',()=> {
        const task = input.value
        if (task === ' ') {
            alert('enter task')
            return
        }
    
    const li = document.createElement('li')
    li.innerHTML=`<input type="checkbox"> ${task}`;
    console.log(li);
    
    list.appendChild(li)
    input.value=" "
    })

</script>
</html>
